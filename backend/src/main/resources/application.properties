spring.application.name=e-commerce

# Configuración de Base de Datos (Usa las variables de tu .env)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/${MYSQL_DATABASE:ecommerce_db}?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=${MYSQL_ROOT_PASSWORD:root}

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Seguridad JWT
application.security.jwt.secret-key=${JWT_SECRET_KEY}

# Configuración del servidor
server.port=${APP_PORT:8080}